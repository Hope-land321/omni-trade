<body class="bg-background text-on-surface font-body-md overflow-hidden flex flex-col min-h-screen">
<!-- Hero Background Visual -->
<div class="fixed inset-0 z-0">
<div class="absolute inset-0 bg-[#0A0F1E]"></div>
<div class="absolute top-[-10%] right-[-10%] w-[600px] h-[600px] bg-primary/10 blur-[120px] rounded-full"></div>
<div class="absolute bottom-[-10%] left-[-10%] w-[400px] h-[400px] bg-primary/5 blur-[100px] rounded-full"></div>
</div>

<div class="w-full max-w-[440px]">
<!-- Branding Area -->
<div class="flex flex-col items-center mb-xl text-center">
<div class="w-16 h-16 rounded-xl bg-primary flex items-center justify-center mb-md primary-glow">
<span class="material-symbols-outlined text-on-primary text-4xl" data-icon="account_balance">account_balance</span>
</div>
<h1 class="font-h2 text-h2 tracking-tight text-primary mb-xs">Omni-Trade</h1>
<p class="font-body-md text-on-surface-variant">Accédez à votre cockpit de trading institutionnel.</p>
</div>
<!-- Login Form -->
<div class="glass-card rounded-xl p-xl relative overflow-hidden">
<!-- Top border highlight -->
<div class="absolute top-0 left-0 w-full h-[1px] bg-gradient-to-r from-transparent via-white/20 to-transparent"></div>
<form class="space-y-md">
<!-- Email Field -->
<div class="space-y-xs">
<label class="font-label-caps text-label-caps text-on-surface-variant block uppercase" for="email">Email professionnel</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-outline" data-icon="mail">mail</span>
<input class="w-full bg-[#0F172A] border border-outline-variant rounded-lg py-md pl-12 pr-md text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary/30 transition-all placeholder:text-outline/50" id="email" name="email" placeholder="nom@entreprise.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-xs">
<div class="flex justify-between items-center">
<label class="font-label-caps text-label-caps text-on-surface-variant block uppercase" for="password">Mot de passe</label>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-outline" data-icon="lock">lock</span>
<input class="w-full bg-[#0F172A] border border-outline-variant rounded-lg py-md pl-12 pr-md text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary/30 transition-all placeholder:text-outline/50" id="password" name="password" placeholder="••••••••" type="password"/>
</div>
<div class="pt-xs text-right">
<a class="text-label-caps font-label-caps text-primary hover:text-primary-container transition-colors uppercase" href="#">Mot de passe oublié ?</a>
</div>
</div>
<!-- Submit Action -->
<button class="w-full bg-primary text-on-primary font-h3 text-body-md py-md rounded-lg primary-glow hover:bg-primary-container transition-all active:scale-[0.98] mt-md" type="submit">
                        Se connecter
                    </button>
</form>
<!-- Divider -->
<div class="flex items-center my-lg">
<div class="flex-grow h-[1px] bg-white/5"></div>
<span class="mx-md text-label-caps font-label-caps text-on-surface-variant uppercase">Ou continuer avec</span>
<div class="flex-grow h-[1px] bg-white/5"></div>
</div>
<!-- Secondary Auth Options -->
<div class="grid grid-cols-2 gap-md">
<button class="flex items-center justify-center gap-xs bg-white/5 border border-white/10 hover:bg-white/10 transition-colors py-sm rounded-lg group">

<span class="material-symbols-outlined text-md" data-icon="key">key</span>
<span class="font-label-caps text-label-caps">SSO</span>
</button>
</div>
</div>
<!-- Footer Link -->
<p class="mt-xl text-center text-on-surface-variant font-body-md">
                Nouveau sur la plateforme ?

</p>
